<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Hunggg NewTab</title>
<meta name="theme-color" content="#000000">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
  --ctp-base:#1e1e2e;
  --ctp-surface:#313244;
  --ctp-text:#cdd6f4;
  --ctp-blue:#89b4fa;
  --ctp-pink:#f5c2e7;
  --glass-bg:rgba(30,30,46,0.34);
  --glass-border:rgba(205,214,244,0.22);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{
  overflow:hidden;
  color:var(--ctp-text);
  background:var(--ctp-base);
}

/* Video */
video{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

/* Static poster fallback for GPU boost */
.poster-bg{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-3;
  display:none;
}

body.gpu-boost video{
  display:none;
}

body.gpu-boost .poster-bg{
  display:block;
}

/* Overlay */
.overlay{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 18% 14%, rgba(137,180,250,0.22) 0%, transparent 35%),
    radial-gradient(circle at 82% 78%, rgba(245,194,231,0.2) 0%, transparent 35%),
    rgba(0,0,0,0.45);
  backdrop-filter:blur(10px);
  z-index:-1;
}

/* Intro screen */
.intro-screen{
  position:fixed;
  inset:0;
  z-index:50;
  display:flex;
  align-items:center;
  justify-content:center;
  background:radial-gradient(circle at center, rgba(49,50,68,0.65) 0%, rgba(17,17,27,0.9) 100%);
  backdrop-filter:blur(14px);
  transition:opacity 0.65s ease, transform 0.65s ease, visibility 0.65s ease;
}

.intro-screen.exit{
  opacity:0;
  transform:scale(1.04);
  visibility:hidden;
}

.intro-card{
  text-align:center;
  padding:30px 40px;
  border-radius:22px;
  border:1px solid var(--glass-border);
  background:linear-gradient(145deg, rgba(30,30,46,0.72), rgba(49,50,68,0.45));
  box-shadow:0 20px 45px rgba(0,0,0,0.35);
}

.intro-title{
  font-family:'Space Grotesk',sans-serif;
  font-size:46px;
  font-weight:700;
  letter-spacing:1.5px;
  background:linear-gradient(100deg, var(--ctp-blue), var(--ctp-pink));
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}

.intro-sub{
  margin-top:12px;
  font-size:14px;
  opacity:0.86;
  animation:introPulse 1.35s ease-in-out infinite;
}

@keyframes introPulse{
  0%{opacity:0.45;}
  50%{opacity:1;}
  100%{opacity:0.45;}
}

body.intro-active .weather,
body.intro-active .credit-btn,
body.intro-active .gpu-btn,
body.intro-active .utility-stack,
body.intro-active .center,
body.intro-active .music-widget,
body.intro-active .quick-links{
  opacity:0;
  transform:translateY(8px);
  pointer-events:none;
}

.weather,
.credit-btn,
.gpu-btn,
.utility-stack,
.center,
.music-widget,
.quick-links{
  transition:opacity 0.4s ease, transform 0.4s ease;
}

/* Center */
.center{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:25px;
  text-align:center;
}

/* Clock */
.clock{
  font-family:'Space Grotesk',sans-serif;
  font-size:86px;
  font-weight:700;
  letter-spacing:2px;
  text-shadow:0 6px 25px rgba(0,0,0,0.45);
}

/* Greeting */
.greeting{
  font-size:23px;
  font-weight:500;
  opacity:0.96;
}

/* Fun text */
.fun-text{
  font-size:15px;
  opacity:0.86;
  color:rgba(205,214,244,0.9);
}

/* Search */
.search-line{
  width:min(560px,76vw);
  position:relative;
  padding:0;
}

.search-line input{
  width:100%;
  background:transparent;
  border:none;
  outline:none;
  color:white;
  font-size:20px;
  padding:10px 0;
  text-align:center;
}

.search-line::after{
  content:"";
  position:absolute;
  left:0;
  bottom:0;
  width:100%;
  height:2px;
  background:linear-gradient(90deg, var(--ctp-blue), var(--ctp-pink));
  transform:scaleX(1);
  transform-origin:center;
}

.search-line input::placeholder{
  color:rgba(255,255,255,0.5);
}

/* Weather */
.weather{
  position:fixed;
  top:30px;
  right:40px;
  background:var(--glass-bg);
  backdrop-filter:blur(16px);
  border:1px solid var(--glass-border);
  box-shadow:0 10px 28px rgba(0,0,0,0.22);
  padding:15px 20px;
  border-radius:16px;
  font-size:14px;
  min-width:160px;
  text-align:right;
}

.weather-temp{
  font-size:22px;
  font-weight:600;
}

/* Music widget */
.music-widget{
  position:fixed;
  bottom:30px;
  left:40px;
  background:var(--glass-bg);
  backdrop-filter:blur(16px);
  border:1px solid var(--glass-border);
  box-shadow:0 10px 28px rgba(0,0,0,0.22);
  padding:12px 18px;
  border-radius:16px;
  display:flex;
  align-items:center;
  gap:10px;
  font-size:14px;
}

.music-widget button{
  background:none;
  border:none;
  color:white;
  font-size:18px;
  cursor:pointer;
}

.music-widget input[type="range"]{
  width:80px;
}

/* Quick links */
.quick-links{
  position:fixed;
  right:40px;
  bottom:30px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:flex-end;
  max-width:420px;
}

.quick-link{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  min-width:88px;
  padding:10px 14px;
  border-radius:14px;
  background:rgba(30,30,46,0.38);
  backdrop-filter:blur(14px);
  color:white;
  text-decoration:none;
  font-size:13px;
  border:1px solid var(--glass-border);
  transition:background 0.2s ease, transform 0.2s ease;
}

.quick-link img{
  width:16px;
  height:16px;
  border-radius:4px;
  object-fit:cover;
  flex:0 0 auto;
}

.quick-link:hover{
  background:rgba(137,180,250,0.26);
  transform:translateY(-2px);
}

.quick-link.add-link{
  min-width:48px;
  font-size:20px;
  cursor:pointer;
}

/* Credit button */
.credit-btn{
  position:fixed;
  top:30px;
  left:40px;
  background:var(--glass-bg);
  backdrop-filter:blur(16px);
  border:1px solid var(--glass-border);
  box-shadow:0 10px 26px rgba(0,0,0,0.2);
  padding:10px 14px;
  border-radius:14px;
  cursor:pointer;
  font-size:14px;
}

.gpu-btn{
  position:fixed;
  top:76px;
  left:40px;
  background:var(--glass-bg);
  backdrop-filter:blur(16px);
  padding:10px 14px;
  border-radius:14px;
  cursor:pointer;
  font-size:12px;
  border:1px solid var(--glass-border);
  color:white;
  box-shadow:0 10px 26px rgba(0,0,0,0.2);
}

.gpu-btn.active{
  background:rgba(137,180,250,0.28);
  border-color:rgba(137,180,250,0.75);
}

/* Utility widgets */
.utility-stack{
  position:fixed;
  top:126px;
  left:40px;
  width:260px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.widget-card{
  background:var(--glass-bg);
  backdrop-filter:blur(16px);
  border:1px solid var(--glass-border);
  box-shadow:0 10px 26px rgba(0,0,0,0.2);
  border-radius:14px;
  padding:12px 14px;
}

.widget-title{
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:1px;
  opacity:0.8;
  margin-bottom:6px;
}

.date-main{
  font-size:18px;
  font-weight:600;
}

.date-sub{
  font-size:12px;
  opacity:0.8;
}

.pomodoro-time{
  font-family:'Space Grotesk',sans-serif;
  font-size:28px;
  font-weight:700;
  line-height:1.1;
  margin-bottom:8px;
}

.pomodoro-actions{
  display:flex;
  gap:8px;
}

.pomodoro-actions button{
  border:1px solid var(--glass-border);
  border-radius:10px;
  background:rgba(137,180,250,0.16);
  color:var(--ctp-text);
  padding:6px 8px;
  font-size:12px;
  cursor:pointer;
}

.notes-input{
  width:100%;
  min-height:72px;
  resize:vertical;
  border:1px solid var(--glass-border);
  border-radius:10px;
  background:rgba(30,30,46,0.45);
  color:var(--ctp-text);
  padding:8px 10px;
  outline:none;
  font-size:13px;
}

.notes-input::placeholder{
  color:rgba(205,214,244,0.55);
}

/* Credit panel */
.credit-panel{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:center;
  align-items:center;
  visibility:hidden;
  opacity:0;
  transition:0.3s;
}

.credit-panel.active{
  visibility:visible;
  opacity:1;
}

.credit-content{
  background:linear-gradient(145deg, rgba(30,30,46,0.7), rgba(49,50,68,0.45));
  backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);
  padding:40px;
  border-radius:20px;
  text-align:center;
}

@media (max-width: 768px){
  .clock{font-size:58px;}
  .greeting{font-size:18px;}
  .fun-text{font-size:13px;}
  .weather{top:18px;right:16px;padding:11px 13px;min-width:130px;}
  .credit-btn{top:18px;left:16px;}
  .gpu-btn{top:60px;left:16px;font-size:11px;padding:8px 12px;}
  .utility-stack{top:98px;left:16px;width:210px;gap:10px;}
  .pomodoro-time{font-size:24px;}
  .music-widget{left:16px;bottom:18px;padding:10px 12px;}
  .quick-links{right:16px;bottom:18px;max-width:58vw;}
  .quick-link{min-width:74px;padding:8px 10px;font-size:12px;}
  .intro-title{font-size:34px;}
  .intro-card{padding:22px 24px;}
}
</style>
</head>

<body class="intro-active">

<video autoplay muted loop poster="poster.jpg">
  <source src="wallpaper.mp4" type="video/mp4">
</video>
<img class="poster-bg" src="poster.jpg" alt="Poster background">
<div class="intro-screen" id="introScreen" aria-label="Intro">
  <div class="intro-card">
    <div class="intro-title">Hunggg NewTab</div>
    <div class="intro-sub">Press Enter To Continue</div>
  </div>
</div>

<div class="overlay"></div>

<div class="weather" id="weather">Loading...</div>

<div class="credit-btn" id="creditBtn">ℹ</div>
<button class="gpu-btn" id="gpuBtn" type="button">GPU Boost: Off</button>
<div class="utility-stack">
  <div class="widget-card date-widget">
    <div class="widget-title">Today</div>
    <div class="date-main" id="dateMain">--</div>
    <div class="date-sub" id="dateSub">--</div>
  </div>

  <div class="widget-card pomodoro-widget">
    <div class="widget-title">Pomodoro</div>
    <div class="pomodoro-time" id="pomodoroTime">25:00</div>
    <div class="pomodoro-actions">
      <button id="pomodoroStart" type="button">Start</button>
      <button id="pomodoroPause" type="button">Pause</button>
      <button id="pomodoroReset" type="button">Reset</button>
    </div>
  </div>

  <div class="widget-card notes-widget">
    <div class="widget-title">Quick Notes</div>
    <textarea id="notesInput" class="notes-input" placeholder="Write something..."></textarea>
  </div>
</div>

<div class="center">
  <div class="clock" id="clock"></div>
  <div class="greeting" id="greeting">Hello</div>
  <div class="fun-text" id="funText"></div>

  <div class="search-line">
    <input id="searchInput" type="text" placeholder="Search..."
      >
  </div>
</div>

<!-- Music -->
<div class="music-widget">
  <button id="playBtn">▶</button>
  <button id="muteBtn">🔊</button>
  <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
</div>

<div class="quick-links" id="quickLinks"></div>

<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- Credit Panel -->
<div class="credit-panel" id="creditPanel">
  <div class="credit-content">
    <h2>Hunggg NewTab</h2>
    <p>Free :)</p>
    <br>
    <button id="closeCreditBtn" type="button">Close</button>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
