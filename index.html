<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Hunggg NewTab</title>
<meta name="theme-color" content="#000000">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{overflow:hidden;color:white;background:black;}

/* Video */
video{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

/* Static poster fallback for GPU boost */
.poster-bg{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-3;
  display:none;
}

body.gpu-boost video{
  display:none;
}

body.gpu-boost .poster-bg{
  display:block;
}

/* Overlay */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.45);
  backdrop-filter:blur(8px);
  z-index:-1;
}

/* Center */
.center{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:25px;
  text-align:center;
}

/* Clock */
.clock{
  font-size:80px;
  font-weight:700;
  letter-spacing:3px;
}

/* Greeting */
.greeting{
  font-size:22px;
  font-weight:500;
  opacity:0.95;
}

/* Fun text */
.fun-text{
  font-size:16px;
  opacity:0.8;
}

/* Search */
.search-line{
  width:450px;
  position:relative;
}

.search-line input{
  width:100%;
  background:transparent;
  border:none;
  outline:none;
  color:white;
  font-size:20px;
  padding:10px 0;
  text-align:center;
}

.search-line::after{
  content:"";
  position:absolute;
  left:0;
  bottom:0;
  width:100%;
  height:2px;
  background:rgba(255,255,255,0.7);
}

.search-line input::placeholder{
  color:rgba(255,255,255,0.5);
}

/* Weather */
.weather{
  position:fixed;
  top:30px;
  right:40px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  padding:15px 20px;
  border-radius:15px;
  font-size:14px;
  min-width:160px;
  text-align:right;
}

.weather-temp{
  font-size:22px;
  font-weight:600;
}

/* Music widget */
.music-widget{
  position:fixed;
  bottom:30px;
  left:40px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  padding:12px 18px;
  border-radius:15px;
  display:flex;
  align-items:center;
  gap:10px;
  font-size:14px;
}

.music-widget button{
  background:none;
  border:none;
  color:white;
  font-size:18px;
  cursor:pointer;
}

.music-widget input[type="range"]{
  width:80px;
}

/* Quick links */
.quick-links{
  position:fixed;
  right:40px;
  bottom:30px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:flex-end;
  max-width:420px;
}

.quick-link{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  min-width:88px;
  padding:10px 14px;
  border-radius:12px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(12px);
  color:white;
  text-decoration:none;
  font-size:13px;
  border:1px solid rgba(255,255,255,0.2);
  transition:background 0.2s ease, transform 0.2s ease;
}

.quick-link img{
  width:16px;
  height:16px;
  border-radius:4px;
  object-fit:cover;
  flex:0 0 auto;
}

.quick-link:hover{
  background:rgba(255,255,255,0.22);
  transform:translateY(-2px);
}

.quick-link.add-link{
  min-width:48px;
  font-size:20px;
  cursor:pointer;
}

/* Credit button */
.credit-btn{
  position:fixed;
  top:30px;
  left:40px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  padding:10px 14px;
  border-radius:12px;
  cursor:pointer;
  font-size:14px;
}

.gpu-btn{
  position:fixed;
  top:76px;
  left:40px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  padding:10px 14px;
  border-radius:12px;
  cursor:pointer;
  font-size:12px;
  border:1px solid rgba(255,255,255,0.25);
  color:white;
}

.gpu-btn.active{
  background:rgba(137,180,250,0.28);
  border-color:rgba(137,180,250,0.75);
}

/* Credit panel */
.credit-panel{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:center;
  align-items:center;
  visibility:hidden;
  opacity:0;
  transition:0.3s;
}

.credit-panel.active{
  visibility:visible;
  opacity:1;
}

.credit-content{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(20px);
  padding:40px;
  border-radius:20px;
  text-align:center;
}
</style>
</head>

<body>

<video autoplay muted loop poster="poster.jpg">
  <source src="wallpaper.mp4" type="video/mp4">
</video>
<img class="poster-bg" src="poster.jpg" alt="Poster background">

<div class="overlay"></div>

<div class="weather" id="weather">Loading...</div>

<div class="credit-btn" id="creditBtn">ℹ</div>
<button class="gpu-btn" id="gpuBtn" type="button">GPU Boost: Off</button>

<div class="center">
  <div class="clock" id="clock"></div>
  <div class="greeting" id="greeting">Hello</div>
  <div class="fun-text" id="funText"></div>

  <div class="search-line">
    <input id="searchInput" type="text" placeholder="Search..."
      >
  </div>
</div>

<!-- Music -->
<div class="music-widget">
  <button id="playBtn">▶</button>
  <button id="muteBtn">🔊</button>
  <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
</div>

<div class="quick-links" id="quickLinks"></div>

<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- Credit Panel -->
<div class="credit-panel" id="creditPanel">
  <div class="credit-content">
    <h2>Hunggg NewTab</h2>
    <p>Free :)</p>
    <br>
    <button id="closeCreditBtn" type="button">Close</button>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
